  SERVICE_CONNECTION_NAME_PRE:     'svccon-app-analysis-pro'     # Example-Workload-Subscription
  SERVICE_CONNECTION_NAME_PRO:     'svccon-app-analysis-pro'     # Example-Workload-Subscription

