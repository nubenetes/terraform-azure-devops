# configuration/variable-group-with-secrets.yml
# https://docs.microsoft.com/en-us/azure/devops/pipelines/library/variable-groups

parameters:
  - name: environment
    displayName: 'Environment: dev (Development & Development Test), qa (Integration Test), uat (User Acceptance Test), pre (Staging), pro (Production)'
    type: string
    default: 'dev'
    values:    # Only the following values are valid and accepted by the pipeline:
      - 'dev'  # Development & Development Test
      - 'qa'   # Integration Test
      - 'uat'  # User Acceptance Test
      - 'pre'  # aka Staging
      - 'pro'  # Production

# Define Variables for Environments
variables:
  - group: DevOps-App-Catalog     # Azure DevOps Pipeline Library Variable Group - Secrets linked from an Azure key vault as variables
  - group: Wildcard-Certifificates   # Azure DevOps Pipeline Library Variable Group - Key Vault with *.Enterprise and *.eng.Enterprise.com signed wildcard certificates.
  - name: TERRAFORM_ENV
    value: ${{ parameters.environment }}
  - name: GIT_BRANCH
    ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
      value: main
    ${{ else }}:
      value: develop
      # set by default
