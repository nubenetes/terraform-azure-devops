# File: templates/include-import-mongodb-collections-from-bitbucket.yml

parameters:
- name: 'mongodb_connection_strings'  # defaults for any parameters that aren't specified
  type: string
  #default: '{"client-anon":"mongodb+srv://app-analysis-client-anon-dev.okv51.mongodb.net","client2":"mongodb+srv://app-analysis-client2-dev.4kx26.mongodb.net"}'
- name: 'mongodb_atlas_database_name'
  type: string
- name: 'mongodb_atlas_dbadmin'  # defaults for any parameters that aren't specified
  type: string
  #default: 'Enterpriseadmin'
- name: 'secret_mongodb_atlas_dbadmin_password'  # defaults for any parameters that aren't specified
  type: string

steps:
- checkout: self
  clean: true
- checkout: MongoDB-Bitbucket-Repo
  clean: true
- script: git config --system -l
  displayName: git config system wide
- bash: env
  displayName: 'Show env'
- bash: |
    echo "Bitbucket ref: $TOOLS_REF"
  displayName: Bitbucket ref    # https://docs.microsoft.com/en-us/azure/devops/pipelines/repos/multi-repo-checkout
- script: ls -la $(Build.SourcesDirectory)
  displayName: Show folders with multi repo checkouts
- task: Bash@3
  inputs:
    filePath: $(Build.SourcesDirectory)/App-Catalog-azure-devops-iac/scripts/import-mongodb-collections.sh
    workingDirectory: $(Build.SourcesDirectory)/enterprise_engine_database/data
    failOnStderr: false
  env:
    MONGODBCONNECTIONS: ${{ parameters.mongodb_connection_strings }}
    MYDBNAME: ${{ parameters.mongodb_atlas_database_name }}
    MYDBADMIN: ${{ parameters.mongodb_atlas_dbadmin }}
    MYSECRET: ${{ parameters.secret_mongodb_atlas_dbadmin_password }}
  displayName: 'Import mongodb collections'
