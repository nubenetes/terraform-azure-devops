              -var secret_aks_kube_config_client_certificate_unitedstates=$(aks-eng-kube-config-client-certificate-usa)
              -var secret_aks_kube_config_client_key_unitedstates=$(aks-eng-kube-config-client-key-usa)
              -var secret_aks_kube_config_cluster_ca_certificate_unitedstates=$(aks-eng-kube-config-cluster-ca-certificate-usa)
