# configuration/variable-group-with-secrets.yml
# https://docs.microsoft.com/en-us/azure/devops/pipelines/library/variable-groups

parameters:
  - name: environment
    displayName: 'Environment: eng (Dev, QA, UAT, Pre), pro (Production)'
    type: string
    default: 'eng'
    values:    # Only the following values are valid and accepted by the pipeline:
      - 'eng'  # DEV, QA, UAT, PRE
      - 'pro'  # Production

# Define Variables for Environments
variables:
  - group: DevOps-aks # Azure DevOps Pipeline Library Variable Group - Secrets linked from an Azure key vault as variables
  - name: TERRAFORM_ENV
    value: ${{ parameters.environment }}
  - name: GIT_BRANCH
    ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
      value: main
    ${{ else }}:
      value: develop
      # set by default
