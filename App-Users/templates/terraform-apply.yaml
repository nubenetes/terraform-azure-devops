###################################################################################
# Assign Azure Custom Security Attributes to Manually Provisioned Internal Users
###################################################################################
- job: assignCustomSecurityAttributeManuallyProvisionedInternalUsers
  dependsOn: DeployInfra
  condition: succeeded()
  pool:
    vmImage: 'windows-2022'
    #vmImage: 'ubuntu-22.04'
    #vmImage: 'macOS-12'
  variables:  # https://docs.microsoft.com/en-us/azure/devops/pipelines/process/deployment-jobs
    list_of_manually_provisioned_internal_users: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput3.list_manually_provisioned_internal_users_with_custom_security_attributes'] ]
  timeoutInMinutes: 90 # how long to run the job before automatically cancelling
  cancelTimeoutInMinutes: 0 # how much time to give 'run always even if cancelled tasks' before stopping them
  steps:
    - pwsh: 'Write-Host "List of Manually Provisioned Internal Users (list_of_manually_provisioned_internal_users): $(list_of_manually_provisioned_internal_users)"'
      displayName: List of Manually Provisioned Internal Users
    - task: AzurePowerShell@5
      displayName: 'run scripts/01-assign-customSecurityAttributes.ps1'
      condition: ne(variables['list_of_manually_provisioned_internal_users'],'[]')
      inputs:
        azureSubscription: ${{ PARAMETERS.SERVICE_CONNECTION_NAME }}
        scriptType: 'FilePath'
        scriptPath: '$(System.DefaultWorkingDirectory)/scripts/01-assign-customSecurityAttributes.ps1'  # https://docs.microsoft.com/en-us/azure/devops/pipelines/build/variables
        scriptArguments:
          -userList '$(list_of_manually_provisioned_internal_users)'
        azurePowerShellVersion: 'latestVersion' # Required. Options: latestVersion, otherVersion
        pwsh: true  # true = powershell 7.x , false = powershell 5.1