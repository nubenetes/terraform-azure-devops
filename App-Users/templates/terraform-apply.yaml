      displayName: List of External Users
    - task: AzurePowerShell@5
      displayName: 'run scripts/01-assign-customSecurityAttributes.ps1'
      condition: ne(variables['list_of_external_users'],'[]')
      inputs:
        azureSubscription: ${{ PARAMETERS.SERVICE_CONNECTION_NAME }}
        scriptType: 'FilePath'
