# https://stackoverflow.com/questions/57150346/is-there-a-way-where-terraform-ignores-resourcenotfoundexception-and-destroys-th
# https://www.terraform.io/cli/commands/state/rm

##################################################################
# This pipeline shows the content of the existing Terraform State
##################################################################

trigger:
- manual

pool:
  vmImage: 'ubuntu-20.04'

parameters:
- name: 'stateShowDEV'
  displayName: 'Terraform state show DEV App-Core (Development & Test)'
  type: boolean
  default: false
- name: 'stateShowQA'
  displayName: 'Terraform state show QA App-Core (Integration Tests)'
  type: boolean
  default: false
- name: 'stateShowUAT' 
  displayName: 'Terraform state show UAT App-Core (User Acceptance Testing)'
  type: boolean
  default: false
- name: 'stateShowPRE' 
  displayName: 'Terraform state show PRE App-Core (Staging)'
  type: boolean
  default: false
- name: 'stateShowPRO' 
  displayName: 'Terraform state show PRO App-Core (Production)'
  type: boolean
  default: false  
- name: 'stateShowDEMO' 
  displayName: 'Terraform state show DEM App-Core (Demo)'
  type: boolean
  default: false  
- name: 'stateShowRES' 
  displayName: 'Terraform state show RES App-Core (RR&D DiscoveryD AppAnalysis)'
  type: boolean
  default: false  

# Define Variables for Environments
variables:
- template: configuration/shared-azure-devops-pipeline-vars.yml
- template: configuration/developbranch-service-connections.yml
- ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
  - template: configuration/mainbranch-service-connections.yml

stages: 
- stage: TerraformstateShowDEV
  displayName: Terraform stateShowDEV
  condition: ${{parameters.stateShowDEV}}
  jobs:
    - template: templates/terraform-state.yml
      parameters: 
        environment: ${{ variables.DEV_ENVIRONMENT }}
        SERVICE_CONNECTION_NAME_TFSTATE: ${{ variables.SERVICE_CONNECTION_NAME_TFSTATE }}
- stage: TerraformstateShowQA
  dependsOn: []    # this removes the implicit dependency on previous stage and causes this to run in parallel
  displayName: Terraform stateShowQA
  condition: ${{parameters.stateShowQA}}
  jobs:
    - template: templates/terraform-state.yml
      parameters: 
        environment: ${{ variables.QA_ENVIRONMENT }}
        SERVICE_CONNECTION_NAME_TFSTATE: ${{ variables.SERVICE_CONNECTION_NAME_TFSTATE }}
- stage: TerraformstateShowUAT
  dependsOn: []    # this removes the implicit dependency on previous stage and causes this to run in parallel
  displayName: Terraform stateShowUAT
  condition: ${{parameters.stateShowUAT}}
  jobs:
    - template: templates/terraform-state.yml
      parameters: 
        environment: ${{ variables.UAT_ENVIRONMENT }}
        SERVICE_CONNECTION_NAME_TFSTATE: ${{ variables.SERVICE_CONNECTION_NAME_TFSTATE }}
- stage: TerraformstateShowPRE
  dependsOn: []    # this removes the implicit dependency on previous stage and causes this to run in parallel
  displayName: Terraform stateShowPRE
  condition: ${{parameters.stateShowPRE}}
  jobs:
    - template: templates/terraform-state.yml
      parameters: 
        environment: ${{ variables.PRE_ENVIRONMENT }}
        SERVICE_CONNECTION_NAME_TFSTATE: ${{ variables.SERVICE_CONNECTION_NAME_TFSTATE }}
- stage: TerraformstateShowPRO
  dependsOn: []    # this removes the implicit dependency on previous stage and causes this to run in parallel
  displayName: Terraform stateShowPRO
  condition: ${{parameters.stateShowPRO}}
  jobs:
    - template: templates/terraform-state.yml
      parameters: 
        environment: ${{ variables.PRO_ENVIRONMENT }}
        SERVICE_CONNECTION_NAME_TFSTATE: ${{ variables.SERVICE_CONNECTION_NAME_TFSTATE }}
- stage: TerraformstateShowDEMO
  dependsOn: []    # this removes the implicit dependency on previous stage and causes this to run in parallel
  displayName: Terraform stateShowDEMO
  condition: ${{parameters.stateShowDEMO}}
  jobs:
    - template: templates/terraform-state.yml
      parameters: 
        environment: ${{ variables.DEMO_ENVIRONMENT }}
        SERVICE_CONNECTION_NAME_TFSTATE: ${{ variables.SERVICE_CONNECTION_NAME_TFSTATE }}
- stage: TerraformstateShowRES
  dependsOn: []    # this removes the implicit dependency on previous stage and causes this to run in parallel
  displayName: Terraform stateShowRES
  condition: ${{parameters.stateShowRES}}
  jobs:
    - template: templates/terraform-state.yml
      parameters: 
        environment: ${{ variables.RESEARCH_ENVIRONMENT }}
        SERVICE_CONNECTION_NAME_TFSTATE: ${{ variables.SERVICE_CONNECTION_NAME_TFSTATE }}