# File: templates/terraform-apply.yml 
# https://github.com/microsoft/azure-pipelines-terraform/tree/main/Tasks/TerraformTask/TerraformTaskV2
# https://github.com/microsoft/azure-pipelines-terraform/tree/main/Tasks/TerraformTask/TerraformTaskV3

parameters:
- name: 'environment'
  type: string
  default: 'dev'
# - name: 'client_name'
#   type: string
#   default: 'myclient'

jobs: 
- deployment: DeployInfra
  displayName: Deploy ${{ upper(parameters.environment) }} App-Core
  environment: ${{ parameters.environment }}
  variables:
    - group: CloudOpsDev-App-Core
      # Current content (example):
      # appGatewayListenerSecure-appanalysis-myclient-dev
      # appGatewayListenerSecure-appcore-myclient-qa
      # k8s-cluster-cert-appanalysis-myclient-2-dev
      # k8s-user-cert-appanalysis-myclient-2-dev
      # k8s-user-key-appanalysis-myclient-2-dev
      # k8s-user-token-appanalysis-myclient-2-dev
      # docker-registry-password-1
      # appanalysis-config-key-myclient-2-dev
  strategy:
    runOnce:
      deploy:
        steps:
        - task: TerraformTaskV3@3
          displayName: Terraform Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            #commandOptions: '-flag'
            backendServiceArm: $(SERVICE_CONNECTION_NAME)
            backendAzureRmResourceGroupName: $(RESOURCE_GROUP_NAME_TERRAFORM_STATE)
            backendAzureRmStorageAccountName: $(STORAGE_ACCOUNT_NAME)
            backendAzureRmContainerName: $(CONTAINER_NAME)
            backendAzureRmKey: '$(INFRA_NAME)-${{ parameters.environment }}.tfstate'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
        - task: TerraformTaskV3@3
          displayName: Terraform plan
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            commandOptions: >
              -var environment=${{ parameters.environment }}
              -var-file="$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)/${{ parameters.environment }}.tfvars"
              -out $(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)/${{ parameters.environment }}-$(Build.BuildId).out
              -var secret_appGatewayListenerSecure=$(appGatewayListenerSecure-appanalysis-myclient-${{ parameters.environment }})
              -var secret_k8s_cluster_certificate=$(k8s-cluster-cert-appanalysis-myclient-2-${{ parameters.environment }})
              -var secret_k8s_user_client_certificate=$(k8s-user-cert-appanalysis-myclient-2-${{ parameters.environment }})
              -var secret_k8s_user_client_key=$(k8s-user-key-appanalysis-myclient-2-${{ parameters.environment }})
              -var secret_k8s_user_token=$(k8s-user-token-appanalysis-myclient-2-${{ parameters.environment }}
              -var secret_docker_registry_server_password='$(docker-registry-password-1)'
              -var secret_appcore_config_key=$(appanalysis-config-key-myclient-2-${{ parameters.environment }})
              -var secret_mongodb_atlas_public_key=$(mongodb-atlas-Enterprise${{ parameters.environment }}test-public-key)
              -var secret_mongodb_atlas_private_key=$(mongodb-atlas-Enterprise${{ parameters.environment }}test-private-key)
              -var secret_mongodb_atlas_dbadmin_password=$(mongodb-atlas-Enterprise${{ parameters.environment }}test-dbuser-password)
              -var secret_mongodb_atlas_dbuser_password=$(mongodb-atlas-Enterprise${{ parameters.environment }}test-dbuser-password)
        - task: TerraformTaskV3@3
          displayName: Terraform apply
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)/${{ parameters.environment }}-$(Build.BuildId).out'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
        - task: TerraformTaskV3@3
          displayName: Terraform Output 
          inputs:
            provider: 'azurerm'
            command: 'output'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
        - task: TerraformTaskV3@3
          displayName: Terraform Show (current tfstate)
          inputs:
            provider: 'azurerm'
            command: 'show' 
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile.json'

        - task: TerraformTaskV3@3
          displayName: Terraform Output myappcore_agw
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: 'output -json myappcore_agw'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile2.json'
        - script: echo "##vso[task.setvariable variable=myappcore_agw;isOutput=true]$(cat $(customFilePath))"
          displayName: setup myappcore_agw var
          name: passOutput1

        - task: TerraformTaskV3@3
          displayName: Terraform Output myManagedIdentity
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: 'output -json myManagedIdentity'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile3.json'
        - script: echo "##vso[task.setvariable variable=myManagedIdentity;isOutput=true]$(cat $(customFilePath))"
          displayName: setup myManagedIdentity var
          name: passOutput2

        - task: TerraformTaskV3@3
          displayName: Terraform Output appcore_keyvault
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: 'output -json appcore_keyvault'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile4.json'
        - script: echo "##vso[task.setvariable variable=appcore_keyvault;isOutput=true]$(cat $(customFilePath))"
          displayName: setup appcore_keyvault var
          name: passOutput3

        - task: TerraformTaskV3@3
          displayName: Terraform Output myCertificateName
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: 'output -json myCertificateName'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile5.json'
        - script: echo "##vso[task.setvariable variable=myCertificateName;isOutput=true]$(cat $(customFilePath))"
          displayName: setup myCertificateName var
          name: passOutput4

        - task: TerraformTaskV3@3
          displayName: Terraform Output myResourceGroup
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: 'output -json myResourceGroup'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile6.json'
        - script: echo "##vso[task.setvariable variable=myResourceGroup;isOutput=true]$(cat $(customFilePath))"
          displayName: setup myResourceGroup var
          name: passOutput5

        - task: TerraformTaskV3@3
          displayName: Terraform Output myAzureSubscription
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: 'output -json myAzureSubscription'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile7.json'
        - script: echo "##vso[task.setvariable variable=myAzureSubscription;isOutput=true]$(cat $(customFilePath))"
          displayName: setup myAzureSubscription var
          name: passOutput6       


        - task: TerraformTaskV3@3
          displayName: Terraform Output mongodb_connection_strings
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: 'output -json mongodb_connection_strings'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile8.json'
        - script: echo "##vso[task.setvariable variable=mongodb_connection_strings;isOutput=true]$(cat $(customFilePath))"   
          displayName: Setup mongodb_connection_strings var
          name: passOutput7          
        # - task: TerraformTaskV3@3
        #   displayName: Terraform Output mongodb_atlas_database_name
        #   inputs:
        #     provider: 'azurerm'
        #     command: 'custom'
        #     workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
        #     commandOptions: 'output -json mongodb_atlas_database_name'
        #     environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
        #     outputTo: 'file'   #'console'
        #     filename: 'myFile9.json'
        # - script: echo "##vso[task.setvariable variable=mongodb_atlas_database_name;isOutput=true]$(cat $(customFilePath))"   
        #   displayName: Setup mongodb_atlas_database_name var
        #   name: passOutput8
        - task: TerraformTaskV3@3
          displayName: Terraform Output secret_mongodb_atlas_dbadmin_password
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: 'output -json secret_mongodb_atlas_dbadmin_password'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile10.json'
        - script: echo "##vso[task.setvariable variable=secret_mongodb_atlas_dbadmin_password;isOutput=true]$(cat $(customFilePath))"   
          displayName: Setup secret_mongodb_atlas_dbadmin_password var
          name: passOutput9
        - task: TerraformTaskV3@3
          displayName: Terraform Output mongodb_atlas_dbadmin
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: 'output -json mongodb_atlas_dbadmin'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile11.json'
        - script: echo "##vso[task.setvariable variable=mongodb_atlas_dbadmin;isOutput=true]$(cat $(customFilePath))"   
          displayName: Setup mongodb_atlas_dbadmin var
          name: passOutput10

        - task: TerraformTaskV3@3
          displayName: Terraform Output list_of_client_names
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: 'output -json list_of_client_names'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile12.json'
        - script: echo "##vso[task.setvariable variable=list_of_client_names;isOutput=true]$(cat $(customFilePath))"   
          displayName: Setup list_of_client_names var
          name: passOutput11
          
        - task: TerraformTaskV3@3
          displayName: Terraform Output Enterprise_product
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(FOLDER_WITH_TERRAFORM_FILES_AFTER_VALIDATION_STAGE)'
            commandOptions: 'output -json Enterprise_product'
            environmentServiceNameAzureRM: $(SERVICE_CONNECTION_NAME)
            outputTo: 'file'   #'console'
            filename: 'myFile13.json'
        - script: echo "##vso[task.setvariable variable=Enterprise_product;isOutput=true]$(cat $(customFilePath))"   
          displayName: Setup Enterprise_product var
          name: passOutput12
          
          

- job: mongoImport
  dependsOn: DeployInfra
  #condition: false    # Currently disabled since it seems like this is not finally required. We leave this here just in case we need it.
  variables:  # https://docs.microsoft.com/en-us/azure/devops/pipelines/process/deployment-jobs
    mongodb_connection_strings: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput7.mongodb_connection_strings'] ]  
    #mongodb_atlas_database_name: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput8.mongodb_atlas_database_name'] ]
    secret_mongodb_atlas_dbadmin_password: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput9.secret_mongodb_atlas_dbadmin_password'] ]
    mongodb_atlas_dbadmin: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput10.mongodb_atlas_dbadmin'] ]
    list_of_client_names: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput11.list_of_client_names'] ]
    Enterprise_product: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput12.Enterprise_product'] ]
  steps:
    - bash: |
        echo $(mongodb_connection_strings)
        echo $(mongodb_atlas_database_name)
        echo $(mongodb_atlas_dbadmin)
        echo $(list_of_client_names)
        echo $(Enterprise_product)
      displayName: Show vars
    - template: include-import-mongodb-collections-from-bitbucket.yml       # Template reference
      parameters:
        mongodb_connection_strings: $(mongodb_connection_strings)
        #mongodb_atlas_database_name: $(mongodb_atlas_database_name)
        mongodb_atlas_dbadmin: $(mongodb_atlas_dbadmin)
        secret_mongodb_atlas_dbadmin_password: $(secret_mongodb_atlas_dbadmin_password)
        list_of_client_names: $(list_of_client_names)
        Enterprise_product: $(Enterprise_product)

- job: appGwCertificateReference
  dependsOn: DeployInfra
  condition: false    # Currently disabled since it seems like this is not finally required. We leave this here just in case we need it.
  pool:
    vmImage: 'windows-2022'
    #vmImage: 'ubuntu-22.04'
    #vmImage: 'macOS-12' 
  variables:  # https://docs.microsoft.com/en-us/azure/devops/pipelines/process/deployment-jobs
    myappcore_agw: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput1.myappcore_agw'] ]  
    myManagedIdentity: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput2.myManagedIdentity'] ]
    appcore_keyvault: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput3.appcore_keyvault'] ]
    myCertificateName: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput4.myCertificateName'] ]
    myResourceGroupName: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput5.myResourceGroup'] ]
    myAzureSubscription: $[ dependencies.DeployInfra.outputs['DeployInfra.passOutput6.myAzureSubscription'] ]
  steps:
    - bash: |
        echo $(myappcore_agw)
        echo $(myResourceGroupName)
        echo $(myManagedIdentity)
        echo $(appcore_keyvault)
        echo $(myCertificateName)
        echo $(myAzureSubscription)
      displayName: Show vars
    - task: AzurePowerShell@5
      displayName: 'run scripts/appgateway_setup_keyvault_certificate_reference.ps1'
      inputs:
        azureSubscription: $(SERVICE_CONNECTION_NAME)
        scriptType: 'FilePath'
        scriptPath: '$(System.DefaultWorkingDirectory)/scripts/appgateway_setup_keyvault_certificate_reference.ps1'
        scriptArguments: '$(myappcore_agw) $(myResourceGroupName) $(myManagedIdentity) $(appcore_keyvault) $(myCertificateName) $(myAzureSubscription)'
        azurePowerShellVersion: 'latestVersion' # Required. Options: latestVersion, otherVersion
