# configuration/variable-group-with-secrets.yml
# https://docs.microsoft.com/en-us/azure/devops/pipelines/library/variable-groups

# https://learn.microsoft.com/en-us/azure/devops/release-notes/2021/sprint-192-update#new-yaml-conditional-expressions

parameters:
  - name: environment
    displayName: 'Environment: dev (Development & Development Test), qa (Integration Test), uat (User Acceptance Test), pre (Staging), pro (Production), dem (DEMO), res (R&D - Discovery)'
    type: string
    #default: 'dev'
    values:    # Only the following values are valid and accepted by the pipeline:
      - 'dev'  # Development & Development Test
      - 'qa'   # Integration Test
      - 'uat'  # User Acceptance Test
      - 'pre'  # aka Staging
      - 'pro'  # Production
      - 'dem'  # Demo
      - 'res'  # Research&Development (Discovery)

# Define Variables for Environments
variables:
  - group: DevOps-appcore     # Azure DevOps Pipeline Library Variable Group - Secrets linked from an Azure key vault as variables
  - group: Wildcard-Certifificates   # Azure DevOps Pipeline Library Variable Group - Key Vault with *.Enterprise and *.eng.Enterprise.com signed wildcard certificates.
  - group: DevOps-aks   # Azure DevOps Pipeline Library Variable Group - Secrets linked from an Azure key vault as variables. They contain kubeconfig certificates required to authenticate against AKS Clusters.
  - name: TERRAFORM_ENV
    value: ${{ parameters.environment }}
  - name: GIT_BRANCH
    ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
      value: main
    ${{ else }}:
      value: develop
