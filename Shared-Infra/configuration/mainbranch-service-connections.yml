# configuration/mainbranch-service-connections.yml

# Define Azure DevOps Service Connections applied on this repo's main branch
variables:
  SERVICE_CONNECTION_NAME_TFSTATE: 'svccon-sharedinfra-devops'  # Azure Subscription with TFSTATE - Enterprise Example-DevOps-Subscription
  SERVICE_CONNECTION_NAME_ENG:     'svccon-sharedinfra-dev'     # Enterprise Example-Dev-Subscription
  SERVICE_CONNECTION_NAME_PRO:     'svccon-sharedinfra-pro'     # Enterprise Example-Prod-Subscription