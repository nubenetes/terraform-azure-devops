apiVersion: batch/v1
kind: Job
metadata:
  generateName:  app-analysis-
  #name: app-analysis #Enterprise-Enterpriseapp-analysis-63f7dac2
  namespace: app-env-dev-client-anon
  labels:
    jobgroup: app-analysis
    app: appcore
spec:
  #completions: 1
  parallelism: 1
  #completionMode: Indexed #NonIndexed
  #backoffLimit: 1
  #suspend: false
  #ttlSecondsAfterFinished: 86400
  template:
    metadata:
      name: kubejob
      labels:
        jobgroup: jobexampleapp-analysis
    spec:
      #terminationGracePeriodSeconds: 180
      nodeSelector:
        #app: mljobs
        agentpool: appspool002
        #nvidia/gpu: "true"
        # https://kubernetes.io/docs/tasks/configure-pod-container/assign-pods-nodes/
      restartPolicy: Never
      #priorityClassName: high-priority
      #dnsPolicy: ClusterFirst
      #schedulerName: default-scheduler
      #securityContext: {}
      #terminationGracePeriodSeconds: 30
      # imagePullSecrets:
      #   - {}
      initContainers:
        - name: normalizer #normalizer-job-v0-2-0
          image: enterprisedevappcr.azurecr.io/normalizer_job:0.2.0
          imagePullPolicy: IfNotPresent
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          env:
            - name: applink_VOLUME_SUBPATH
              valueFrom:
                configMapKeyRef:
                  name: ml-config
                  key: assetrelativepath
          resources:
            limits:
              cpu: 200m #"1"
              memory: 350Mi #500Mi #1000Mi #2000Mi
                #200Mi (OOMKilled)
            requests:
              cpu: 100m #"1"
              memory: 50Mi #200Mi #2000Mi
          volumeMounts:
            - name: storage
              mountPath: /asset
              subPathExpr: $(applink_VOLUME_SUBPATH)
      containers:
        - name: app-analysis #app-analysis-vupdate-common-lib-fa5e687
          image: enterprisedevappcr.azurecr.io/app-analysis-service:update_common-lib-fa5e687
          imagePullPolicy: IfNotPresent
          args: ["$(applink_JSON)", "$(applink_TOKEN)"]
          # https://stackoverflow.com/questions/31870222/how-can-i-keep-a-container-running-on-kubernetes
          #command: ["/bin/sh", "-ec", "sleep 1000"]   # sleep command
          #command: ["/bin/sh", "-ec", "while :; do echo 'infinite loop enabled for debugging purposes'; sleep 5 ; done"]   # infinite loop enabled for debugging purposes
          #terminationMessagePath: /dev/termination-log
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          env:
            - name: applink_JSON
              valueFrom:
                configMapKeyRef:
                  name: ml-config
                  key: json
            - name: applink_TOKEN
              valueFrom:
                secretKeyRef:
                  name: applink-cloud-secret
                  key: token
            - name: applink_VOLUME_SUBPATH
              valueFrom:
                configMapKeyRef:
                  name: ml-config
                  key: assetrelativepath
          resources:
            limits:
              cpu: 1500m #"3" #"1"
              memory: 2000Mi #16000Mi #6000Mi
            requests:
              cpu: 1000m #"3" #"4"
              memory: 1000Mi #16000Mi #16000Mi
          volumeMounts:
            - name: storage
              mountPath: /asset
              subPathExpr: $(applink_VOLUME_SUBPATH)
        # - name: sidecar-container # https://www.airplane.dev/blog/kubernetes-sidecar-container
        #   image: busybox
        #   # https://blog.knoldus.com/how-to-use-kubernetes-sidecar-container/
        #   # https://hub.docker.com/_/busybox
        #   # https://stackoverflow.com/questions/31870222/how-can-i-keep-a-container-running-on-kubernetes
        #   #command: ["sh","-c","while true; do cat /var/log/nginx/access.log; sleep 30; done"]
        #   command: ['sh', '-c', 'while true; do date; sleep 3; done']
      volumes:
      # - name: storage
      #   azureFile:
      #     secretName: stappcoreclient-anon
      #     shareName: fs-appcore-client-anon-client-anon
        - name: storage
          persistentVolumeClaim:
            claimName: client-anon
  ttlSecondsAfterFinished: 86400

# https://github.com/kubernetes/examples/blob/master/staging/volumes/azure_file/azure-2.yaml
# https://fabianlee.org/2000/01/01/kubernetes-export-a-clean-yaml-manifest-that-can-be-re-imported/
# https://github.com/Kyrremann/kubectl-eksporter
# kubectl eksporter job Enterprise-Enterpriseapp-analysis-63f7dac0 -n Enterprise

#####################################################################################################################
# input.json -> para sacar los datos para analizar

# token -> para llamar de vuelta al endpoint de App-Link Cloud !!!!!!!
# Generate this token with Postman; if it is not valid, we get a "ValueError: Invalid header value b'Bearer"

